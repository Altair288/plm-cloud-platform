server:
  port: 8081

plm:
  datasource:
    url: jdbc:postgresql://localhost:5432/plm
    username: admin
    password: p@ssw0rd@2025
    driver-class-name: org.postgresql.Driver
  auth:
    login:
      expire-in-seconds: ${PLM_AUTH_LOGIN_EXPIRE_IN_SECONDS:43200}
      remember-expire-in-seconds: ${PLM_AUTH_LOGIN_REMEMBER_EXPIRE_IN_SECONDS:2592000}
    platform-admin:
      bootstrap:
        enabled: ${PLM_AUTH_PLATFORM_ADMIN_BOOTSTRAP_ENABLED:true}
        username: ${PLM_AUTH_PLATFORM_ADMIN_USERNAME:plm_admin}
        display-name: ${PLM_AUTH_PLATFORM_ADMIN_DISPLAY_NAME:Platform Admin}
        email: ${PLM_AUTH_PLATFORM_ADMIN_EMAIL:admin@plm.local}
        password: ${PLM_AUTH_PLATFORM_ADMIN_PASSWORD:Admin@123456}
        role-code: ${PLM_AUTH_PLATFORM_ADMIN_ROLE_CODE:platform_super_admin}
    password-rsa:
      enabled: ${PLM_AUTH_PASSWORD_RSA_ENABLED:true}
      redis-key-prefix: ${PLM_AUTH_PASSWORD_RSA_REDIS_KEY_PREFIX:plm:auth:password-rsa}
      redis-ttl-seconds: ${PLM_AUTH_PASSWORD_RSA_REDIS_TTL_SECONDS:86400}
      allow-plaintext-fallback: ${PLM_AUTH_PASSWORD_RSA_ALLOW_PLAINTEXT_FALLBACK:false}
      key-id: ${PLM_AUTH_PASSWORD_RSA_KEY_ID:auth-password-rsa-v1}
      transformation: ${PLM_AUTH_PASSWORD_RSA_TRANSFORMATION:RSA/ECB/OAEPWithSHA-256AndMGF1Padding}
      key-size: ${PLM_AUTH_PASSWORD_RSA_KEY_SIZE:2048}
      public-key-pem: ${PLM_AUTH_PASSWORD_RSA_PUBLIC_KEY_PEM:}
      private-key-pem: ${PLM_AUTH_PASSWORD_RSA_PRIVATE_KEY_PEM:}
    invitation:
      email-subject: PLM Cloud Workspace Invitation
      email-expire-in-seconds: 604800
      link-expire-in-hours: 168
      max-batch-size: 50
      email-accept-url-template: ${PLM_AUTH_INVITATION_EMAIL_ACCEPT_URL_TEMPLATE:http://localhost:8080/invite/email?token=%s}
      link-accept-url-template: ${PLM_AUTH_INVITATION_LINK_ACCEPT_URL_TEMPLATE:http://localhost:8080/invite/link?token=%s}
    email:
      verification:
        enabled: true
        api-url: https://api.resend.com/emails
        api-key: ${PLM_AUTH_RESEND_API_KEY:}
        from-email: ${PLM_AUTH_RESEND_FROM_EMAIL:no-reply@altair288.eu.org}
        from-name: PLM Cloud
        subject: PLM Cloud Email Verification Code
        expire-in-seconds: 600
        resend-cooldown-seconds: 60

spring:
  data:
    redis:
      host: ${PLM_AUTH_REDIS_HOST:localhost}
      port: ${PLM_AUTH_REDIS_PORT:6379}
      password: ${PLM_AUTH_REDIS_PASSWORD:p@ssw0rd@2025}
      database: ${PLM_AUTH_REDIS_DATABASE:0}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        '[format_sql]': true

logging:
  level:
    root: info
