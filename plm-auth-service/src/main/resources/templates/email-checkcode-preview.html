              有人尝试使用您的邮箱 <span style="font-weight:700; color:#2563eb;">%s</span> 注册 Cloud Platform 账户。
              请使用以下验证码完成设置。
            </p>

            <div style="margin: 32px 0; padding: 24px; background-color: #f8f9fa; border-radius: 4px; text-align: center;">

                %s
              </div>
            </div>

            <p style="margin:0 0 24px; font-size:14px; line-height:1.5; color:#3c4043;">
              此代码的有效期为 <strong>%d 分钟</strong>。出于安全考虑，请勿将此代码转发给任何人。
            </p>

            <p style="margin:0; font-size:12px; line-height:1.6; color:#70757a;">
              如果您没有请求此代码，可能是由于其他人在输入电子邮件地址时出现了失误。您可以安全地忽略此邮件。
            </p>

            <hr style="margin: 32px 0 24px; border: 0; border-top: 1px solid #e0e0e0;" />

            <div style="font-size:12px; color:#70757a; line-height:1.5;">
              此邮件由系统自动发出，请勿直接回复。<br/>
