<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workspace Invitation</title>
</head>
<body style="margin:0;padding:0;background-color:#ffffff;font-family:'Google Sans', Roboto, Arial, sans-serif;color:#3c4043;">
  
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color:#ffffff;">
    <tr>
      <td align="center" style="padding: 32px 10px;">
        
        <div style="max-width: 520px; width: 100%; margin: 0 auto; border: 1px solid #e0e0e0; border-radius: 8px; text-align: left; overflow: hidden;">
          
          <div style="padding: 40px 32px;">
            
            <div style="margin-bottom: 32px;">
              <div style="display:inline-block; width:40px; height:40px; border-radius:8px; background-color:#0f172a; color:#ffffff; font-size:20px; line-height:40px; font-weight:700; text-align:center;">P</div>
              <span style="margin-left:12px; font-size:22px; color:#5f6368; vertical-align:middle; font-weight:400;">PLM Cloud</span>
            </div>

            <h1 style="margin:0 0 16px; font-size:24px; font-weight:500; color:#202124; line-height:1.3;">
              加入工作空间邀请
            </h1>
            
            <p style="margin:0 0 24px; font-size:15px; line-height:1.6; color:#3c4043;">
              <span style="font-weight:700; color:#202124;">%s</span> (邀请人) 邀请您加入以下工作空间，共同协作管理。
            </p>

            <div style="margin: 32px 0; padding: 24px; background-color: #f8f9fa; border-radius: 8px; border: 1px solid #f1f3f4; text-align: center;">
              <div style="width:48px; height:48px; margin:0 auto 12px; border-radius:50%; background-color:#e8f0fe; color:#1a73e8; font-size:20px; line-height:48px; font-weight:700;">W</div>
              <div style="font-size:18px; font-weight:700; color:#202124; margin-bottom:4px;">%s</div>
              <div style="font-size:13px; color:#70757a;">团队工作空间</div>
            </div>

            <div style="margin: 32px 0; text-align: center;">
              <a href="%s" style="display: inline-block; padding: 12px 32px; background-color: #2563eb; color: #ffffff; text-decoration: none; border-radius: 4px; font-size: 14px; font-weight: 500; box-shadow: 0 1px 2px rgba(60,64,67,0.3);">
                接受邀请并加入
              </a>
            </div>

            <p style="margin:0 0 24px; font-size:13px; line-height:1.6; color:#70757a;">
              此邀请链接将于 <strong>%d 小时</strong> 后过期。如果您不认识邀请人，可以忽略此邮件。
            </p>

            <hr style="margin: 32px 0 24px; border: 0; border-top: 1px solid #e0e0e0;" />

            <div style="font-size:12px; color:#70757a; line-height:1.5;">
              <strong>关于此操作：</strong> 您被邀请使用 PLM Cloud。加入后，您的账户信息将对该工作空间的其他成员可见。<br/>
              © 2026 PLM Cloud Enterprise, Inc.
            </div>

          </div>
        </div>

        <div style="max-width: 520px; width: 100%; margin: 16px auto; text-align: left; padding: 0 32px;">
           <table width="100%">
             <tr>
               <td style="font-size:12px; color:#70757a;">
                 <a href="#" style="color:#70757a; text-decoration:none;">了解更多</a> &nbsp; | &nbsp; 
                 <a href="#" style="color:#70757a; text-decoration:none;">联系支持</a>
               </td>
             </tr>
           </table>
        </div>

      </td>
    </tr>
  </table>

</body>
</html>
