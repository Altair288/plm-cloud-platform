# Dev profile database configuration for Flyway migrations
# 使用环境变量可覆盖下方值 (SPRING_DATASOURCE_URL 等)

plm:
  datasource:
    url: jdbc:postgresql://localhost:5432/plm
    username: admin
    password: p@ssw0rd@2025
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
  workbook-import:
    async:
      thread-name-prefix: workbook-import-
      core-pool-size: 2
      max-pool-size: 4
      queue-capacity: 32
    runtime:
      cleanup-interval-millis: 600000
      session-retention-millis: 86400000
      terminal-job-retention-millis: 3600000

spring:
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        '[jdbc.batch_size]': 500
        '[order_inserts]': true
        '[order_updates]': true
        '[generate_statistics]': false

logging:
  level:
    root: info
    '[com.plm.attribute.version.service.MetaAttributeImportService]': DEBUG

# 可以通过 -Dspring.profiles.active=dev 或环境变量 SPRING_PROFILES_ACTIVE=dev 激活

